<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Explore Canadian population and permanent resident immigration trends using official public data from Statistics Canada and IRCC."
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0f172a" />
    <title>Canadian Population & Immigration Dashboard</title>
    <script>
      const storedTheme = localStorage.getItem("dashboard-theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (
        storedTheme === "dark" ||
        (!storedTheme && prefersDark) ||
        (storedTheme === "system" && prefersDark)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
