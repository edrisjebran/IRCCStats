<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Explore Canadian population and permanent resident immigration trends using official public data from Statistics Canada and IRCC."
    />
    <title>Canadian Population & Immigration Dashboard</title>
    <script>
      const storedTheme = localStorage.getItem("dashboard-theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (
        storedTheme === "dark" ||
        (!storedTheme && prefersDark) ||
        (storedTheme === "system" && prefersDark)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
